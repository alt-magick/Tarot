<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Tarot Readings</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1e1b2e, #2c2445);
    margin: 0;
    padding: 30px 20px;
    color: #f2f2f2;
}
.header-container {
    display: flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
}
h1 {
    font-family: 'Cinzel', serif;
    font-size: 50px;
    display: inline-block;
    transform: scale(1.5);
    text-align: center;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #f0d878, #fff18f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: goldPulse 2s infinite alternate linear;
}
@keyframes goldPulse {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}
.card {
    background: rgba(255,255,255,0.05);
    margin: 10px 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
}
.card-title {
    padding: 14px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
}
.card-content {
    max-height: 0;
    overflow: hidden;
    padding: 0 16px;
    transition: 0.4s;
    opacity: 0;
}
.card.active .card-content {
    max-height: 200px;
    padding: 14px 16px;
    opacity: 1;
}
button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    background: #f0d878;
    cursor: pointer;
}
</style>
<script>
function toggleCard(el){
    const card = el.parentElement;
    document.querySelectorAll('.card').forEach(c=>{
        if(c!==card) c.classList.remove('active');
    });
    card.classList.toggle('active');
}
function openRandomCard(){
    const cards=document.querySelectorAll('.card');
    cards.forEach(c=>c.classList.remove('active'));
    const r=Math.floor(Math.random()*cards.length);
    cards[r].classList.add('active');
    cards[r].scrollIntoView({behavior:'smooth',block:'center'});
}
function shuffleCards(){
    const c=document.querySelector('.container');
    const arr=[...c.children];
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    arr.forEach(el=>c.appendChild(el));
}
</script>
</head>
<body>

<div class="header-container">
<h1>Tarot Readings</h1>
</div>

<div style="text-align:center;">
<button onclick="openRandomCard()">🔮 Random Card</button>
<button onclick="shuffleCards()">🃏 Shuffle Cards</button>
</div>

<div class="container">

</script>

</body>
